<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUCA SALVIGNI - Digital Business Card</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Tailwind Custom Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'dark-bg': '#1A1A1A',
                        'gold': '#C4A77C',
                        'slate': '#4F4F4F',
                    },
                    fontFamily: {
                        serif: ['Playfair Display', 'serif'],
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    
    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        
        h1, h2, h3 {
            font-family: 'Playfair Display', serif;
        }
        
        body {
            background-color: #1A1A1A;
            color: #FFFFFF;
        }
        
        /* Scroll Reveal Animation */
        .scroll-reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.4s ease-out, transform 0.4s ease-out;
            will-change: opacity, transform;
        }
        
        .scroll-reveal.active {
            opacity: 1;
            transform: translateY(0);
        }
        
        /* Service Card Hover */
        .service-card {
            position: relative;
            overflow: hidden;
            transition: border-color 0.3s ease-out;
            border: 2px solid transparent;
            will-change: border-color;
        }
        
        .service-card:hover {
            border-color: #C4A77C;
        }
        
        .service-card img {
            transition: transform 0.3s ease-out;
            will-change: transform;
        }
        
        .service-card:hover img {
            transform: scale(1.08);
        }
        
        /* Scroll Down Arrow Animation */
        .scroll-arrow {
            animation: bounce 2s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        /* Button Hover Effects */
        .contact-btn {
            border: 2px solid #C4A77C;
            color: #C4A77C;
            transition: background-color 0.2s ease-out, color 0.2s ease-out;
            will-change: background-color, color;
        }
        
        .contact-btn:hover {
            background-color: #C4A77C;
            color: #1A1A1A;
        }
        
        /* Slider Modal Styles */
        .slider-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            overflow: hidden;
        }
        
        .slider-modal.active {
            display: flex;
        }
        
        .slider-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .slider-image-wrapper {
            width: 90%;
            height: 80%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .slider-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            animation: fadeIn 0.3s ease-in;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        
        .slider-nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(196, 167, 124, 0.7);
            border: none;
            color: #1A1A1A;
            width: 50px;
            height: 50px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 1001;
        }
        
        .slider-nav-btn:hover {
            background-color: #C4A77C;
            transform: translateY(-50%) scale(1.1);
        }
        
        .slider-nav-btn.prev {
            left: 20px;
        }
        
        .slider-nav-btn.next {
            right: 20px;
        }
        
        .slider-close-btn {
            position: absolute;
            top: 30px;
            right: 30px;
            background-color: rgba(196, 167, 124, 0.7);
            border: none;
            color: #1A1A1A;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 1001;
        }
        
        .slider-close-btn:hover {
            background-color: #C4A77C;
        }
        
        .slider-counter {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #C4A77C;
            font-size: 16px;
            font-weight: 600;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 8px 16px;
            border-radius: 4px;
        }
        
        .slider-title {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #C4A77C;
            font-size: 24px;
            font-weight: 700;
            font-family: 'Playfair Display', serif;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 4px;
        }
        
        /* Video Gallery Styles */
        .video-card {
            transition: transform 0.3s ease-out;
            will-change: transform;
        }
        
        .video-card:hover {
            transform: translateY(-5px);
        }
        
        video {
            display: block;
            background-color: #000;
        }
        
        
        /* Hero Background Blur */
        .hero-bg {
            background-image: url('./Immagini/Varie/Cielo.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            transition: filter 0.3s ease-out;
        }
        
        /* Hamburger Menu Animation */
        .hamburger-menu {
            position: relative;
            width: 24px;
            height: 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: all 0.3s ease-in-out;
        }
        
        .hamburger-menu.active {
            transform: rotateZ(180deg);
        }
        
        .hamburger-line {
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            transform-origin: center;
        }
        
        .hamburger-menu.active .hamburger-line:nth-child(1) {
            transform: translateY(12px) rotateZ(45deg) scaleX(1.1);
        }
        
        .hamburger-menu.active .hamburger-line:nth-child(2) {
            opacity: 0;
            transform: scaleX(0);
        }
        
        .hamburger-menu.active .hamburger-line:nth-child(3) {
            transform: translateY(-12px) rotateZ(-45deg) scaleX(1.1);
        }
    </style>
</head>
<body class="bg-dark-bg text-white overflow-x-hidden">

                <a href="contact.html" class="flex flex-col items-center gap-1 text-slate hover:text-gold transition-colors group">

            <!-- Mobile Hamburger Menu -->

                    <span class="hamburger-line w-6 h-0.5 bg-gold group-hover:bg-white transition-colors"></span>

    </nav>
    
    <!-- MOBILE MENU DROPDOWN -->

        <div class="flex flex-col gap-4 p-6">
            <a href="index.html" class="flex items-center gap-3 text-slate hover:text-gold transition-colors font-semibold">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
                </svg>

            </a>
            
            <a href="equipment.html" class="flex items-center gap-3 text-slate hover:text-gold transition-colors font-semibold">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M20 5H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 12H4V7h16v10zm-1-7h-4V6h4v4z"/>
                </svg>
                ATTREZZATURA
            </a>
            
            <a href="contact.html" class="flex items-center gap-3 text-slate hover:text-gold transition-colors font-semibold">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M20 10c0-5.523-4.477-10-10-10S0 4.477 0 10c0 5.523 4.477 10 10 10s10-4.477 10-10zm-2 0a8 8 0 11-16 0 8 8 0 0116 0zm-8-5a1 1 0 100 2 1 1 0 000-2zm0 4a1 1 0 100 2 1 1 0 000-2zm0 4a1 1 0 100 2 1 1 0 000-2z"/>
                </svg>

            </a>

    <!-- SEZIONE 1: HERO (Full-screen) -->
    <section id="hero" class="relative w-full h-screen pt-24 flex flex-col items-center justify-center overflow-hidden">
        <!-- Background Image -->
        <img src="https://lh3.googleusercontent.com/d/1q4CqB5m2mHODAnPhcM-T51W9oh4MLvP3" alt="Hero Background" class="absolute inset-0 w-full h-full object-cover -z-10">
        
        <!-- Dark overlay per leggibilità del testo -->
        <div class="absolute inset-0 bg-black opacity-40 -z-10"></div>
        
        <!-- Hero Content -->
        <div class="relative z-10 text-center px-4">
            <h1 class="font-serif text-6xl md:text-8xl font-bold text-gold mb-4 drop-shadow-lg" style="text-shadow: 0 4px 20px rgba(0,0,0,0.8), 0 2px 10px rgba(0,0,0,0.6);">

            </h1>
            <p class="font-sans text-lg md:text-2xl text-white drop-shadow-md tracking-wider" style="text-shadow: 0 2px 15px rgba(0,0,0,0.9);">

        <!-- Scroll Down Arrow -->
        <div class="absolute bottom-10 z-10 flex flex-col items-center gap-4 cursor-pointer scroll-arrow" id="scrollDownBtn">

    <section id="services" class="w-full py-24 px-4 md:px-16 bg-dark-bg">

            <h2 class="font-serif text-5xl md:text-6xl font-bold text-white mb-16 text-center">

                    </div>

                <!-- Card 2: RITRATTI -->
                <div class="service-card scroll-reveal" data-category="Ritratti">
                    <div class="relative overflow-hidden aspect-square bg-slate">
                        <img src="https://lh3.googleusercontent.com/d/193cVHFame0FxEwSNISuLLlFAZWBQMT5c" 
                             alt="Ritratti" class="w-full h-full object-cover">
                    </div>
                    <div class="absolute inset-0 flex items-end bg-gradient-to-t from-black to-transparent p-6">
                        <h3 class="font-sans text-2xl font-bold text-white">RITRATTI</h3>
                    </div>
                </div>
                
                <!-- Card 3: VARIE -->
                <div class="service-card scroll-reveal" data-category="Varie">
                    <div class="relative overflow-hidden aspect-square bg-slate">
                        <img src="https://lh3.googleusercontent.com/d/15WcSA232wlCdAOWiQlkzyCYeuMC3adeL" 
                             alt="Varie" class="w-full h-full object-cover">
                    </div>
                    <div class="absolute inset-0 flex items-end bg-gradient-to-t from-black to-transparent p-6">
                        <h3 class="font-sans text-2xl font-bold text-white">VARIE</h3>
                    </div>

                <!-- Card 4: ESIBIZIONI -->
                <div class="service-card scroll-reveal" data-category="Esibizioni">
                    <div class="relative overflow-hidden aspect-square bg-slate">
                        <img src="https://lh3.googleusercontent.com/d/1MB2wK-DgMPZOyUb3x6-8hYbE2LknZkYr" 
                             alt="Esibizioni" class="w-full h-full object-cover">
                    </div>
                    <div class="absolute inset-0 flex items-end bg-gradient-to-t from-black to-transparent p-6">

    </section>
    
    <!-- SLIDER MODAL -->
    <div id="sliderModal" class="slider-modal">
        <div class="slider-container">
            <h2 class="slider-title" id="sliderTitle">COMPLEANNI</h2>
            
            <div class="slider-image-wrapper">
                <img id="sliderImage" src="" alt="Gallery Image" class="slider-image">
                
                <button class="slider-nav-btn prev" id="prevBtn">&lt;</button>
                <button class="slider-nav-btn next" id="nextBtn">&gt;</button>
            </div>
            
            <div class="slider-counter" id="sliderCounter">1 / 10</div>
            <button class="slider-close-btn" id="closeSliderBtn">&times;</button>
        </div>
    </div>
    
    <!-- SEZIONE 4: FOOTER -->
    <footer class="w-full py-12 px-4 bg-dark-bg border-t border-slate border-opacity-20">
        <div class="max-w-7xl mx-auto text-center">
            <p class="text-slate text-sm">
                © 2026 LUCA SALVIGNI. Tutti i diritti riservati.
            </p>
        </div>
    </footer>
    
    <!-- JAVASCRIPT: Smooth Scroll, Scroll Reveal, Hero Blur & Slider Gallery -->
    <script>
        // ===== MOBILE MENU TOGGLE =====
        const mobileMenuBtn = document.getElementById('mobileMenuBtn');
        const mobileMenu = document.getElementById('mobileMenu');
        
        mobileMenuBtn.addEventListener('click', () => {
            mobileMenu.classList.toggle('hidden');
            mobileMenuBtn.classList.toggle('active');
        });
        
        // Chiudi il menu quando clicchi su un link
        const mobileLinks = mobileMenu.querySelectorAll('a');
        mobileLinks.forEach(link => {
            link.addEventListener('click', () => {
                mobileMenu.classList.add('hidden');
                mobileMenuBtn.classList.remove('active');
            });
        });
        
        // ===== SLIDER GALLERY =====
        const sliderModal = document.getElementById('sliderModal');
        const sliderImage = document.getElementById('sliderImage');
        const sliderTitle = document.getElementById('sliderTitle');
        const sliderCounter = document.getElementById('sliderCounter');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const closeSliderBtn = document.getElementById('closeSliderBtn');
        const serviceCards = document.querySelectorAll('.service-card');
        
        let currentCategory = '';
        let currentImageIndex = 0;
        let categoryImages = [];
        let galleryConfig = null;
        
        // Crea URL di Google Drive dal file ID
        function getDriveImageUrl(fileId) {
            return `https://lh3.googleusercontent.com/d/${fileId}`;
        }
        
        // Carica la configurazione della galleria
        async function loadGalleryConfig() {
            try {
                const response = await fetch('gallery-config.json');
                galleryConfig = await response.json();
                console.log('✅ Configurazione galleria caricata');
            } catch (error) {
                console.error('Errore nel caricamento della configurazione della galleria:', error);
                galleryConfig = {};
            }
        }
        
        // Carica la configurazione all'avvio
        loadGalleryConfig();
        
        // Funzione per aprire lo slider con una categoria
        function openSlider(category) {
            currentCategory = category;
            currentImageIndex = 0;
            
            if (galleryConfig && galleryConfig[category]) {
                categoryImages = galleryConfig[category];
            } else {
                categoryImages = [];
            }
            
            if (categoryImages.length === 0) {
                console.warn(`Nessuna immagine trovata per la categoria: ${category}`);
                return;
            }
            
            sliderTitle.textContent = category.toUpperCase();
            updateSlider();
            sliderModal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        
        // Funzione per aggiornare l'immagine dello slider
        function updateSlider() {
            if (categoryImages.length === 0) return;
            
            const imageData = categoryImages[currentImageIndex];
            let imageSrc;
            
            if (imageData.fileId) {
                // Carica da Google Drive
                imageSrc = getDriveImageUrl(imageData.fileId);
            } else if (typeof imageData === 'string') {
                // Percorso locale (retrocompatibilità)
                imageSrc = imageData;
            } else {
                console.warn('Formato immagine non riconosciuto:', imageData);
                imageSrc = '';
            }
            
            sliderImage.src = imageSrc;
            sliderImage.alt = `${currentCategory} - Immagine ${currentImageIndex + 1}`;
            sliderCounter.textContent = `${currentImageIndex + 1} / ${categoryImages.length}`;
        }
        
        // Event listeners per le frecce di navigazione
        nextBtn.addEventListener('click', () => {
            if (categoryImages.length === 0) return;
            currentImageIndex = (currentImageIndex + 1) % categoryImages.length;
            updateSlider();
        });
        
        prevBtn.addEventListener('click', () => {
            if (categoryImages.length === 0) return;
            currentImageIndex = (currentImageIndex - 1 + categoryImages.length) % categoryImages.length;
            updateSlider();
        });
        
        // Funzione per chiudere lo slider
        function closeSlider() {
            sliderModal.classList.remove('active');
            document.body.style.overflow = 'auto';
        }
        
        closeSliderBtn.addEventListener('click', closeSlider);
        
        // Chiudi slider quando clicchi fuori dall'immagine
        sliderModal.addEventListener('click', (e) => {
            if (e.target === sliderModal) {
                closeSlider();
            }
        });
        
        // Tastiera: frecce e ESC
        document.addEventListener('keydown', (e) => {
            if (sliderModal.classList.contains('active')) {
                if (e.key === 'ArrowRight') nextBtn.click();
                if (e.key === 'ArrowLeft') prevBtn.click();
                if (e.key === 'Escape') closeSlider();
            }
        });
        
        // Aggiungi event listeners alle service cards
        serviceCards.forEach(card => {
            card.style.cursor = 'pointer';
            card.addEventListener('click', () => {
                const category = card.getAttribute('data-category');
                if (category) {
                    openSlider(category);
                }
            });
        });
        
        // ===== SMOOTH SCROLLING =====
        document.getElementById('scrollDownBtn').addEventListener('click', function() {
            const servicesSection = document.getElementById('services');
            servicesSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
        
        // ===== SCROLL REVEAL (Intersection Observer) =====
        const revealElements = document.querySelectorAll('.scroll-reveal');
        
        const observerOptions = {
            threshold: 0.1,
            rootMargin: '0px 0px -50px 0px'
        };
        
        const observer = new IntersectionObserver(function(entries) {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                    observer.unobserve(entry.target);
                }
            });
        }, observerOptions);
        
        revealElements.forEach(element => {
            observer.observe(element);
        });
        
        // ===== HERO BLUR & DARKEN ON SCROLL =====
        const heroSection = document.getElementById('hero');
        let rafId = null;
        let lastScrollY = 0;
        
        function updateHeroEffect() {
            const scrolled = lastScrollY;
            const heroHeight = heroSection.offsetHeight;
            const scrollPercent = (scrolled / heroHeight) * 100;
            
            // Calcola il blur e la luminosità
            const blurAmount = Math.min(scrollPercent / 10, 5); // Max 5px blur
            const darkenAmount = Math.min(scrollPercent / 20, 0.3); // Max 0.3 opacity
            
            heroSection.style.filter = `blur(${blurAmount}px) brightness(${1 - darkenAmount})`;
        }
        
        window.addEventListener('scroll', function() {
            lastScrollY = window.pageYOffset;
            
            if (rafId) {
                cancelAnimationFrame(rafId);
            }
            rafId = requestAnimationFrame(updateHeroEffect);
        }, { passive: true });
    </script>
    
</body>
</html>
